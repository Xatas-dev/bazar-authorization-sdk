syntax = "proto3";

package bazar.authorization.v1;

option java_multiple_files = true;
option java_package = "org.bazar.authorization.grpc";
option java_outer_classname = "AuthorizationProto";

service AuthorizationService {
  rpc Authorize(AuthorizeRequest)
      returns (AuthorizeResponse);
}

service AuthorizationAdminService {
  rpc CreateUser(CreateUserRequest)
      returns (CreateUserResponse);

  rpc DeleteUser(DeleteUserRequest)
      returns (DeleteUserResponse);

  rpc DeleteSpace(DeleteSpaceRequest)
      returns (DeleteSpaceResponse);
}

message AuthorizeRequest {
  string resource = 1;
  int64 space_id = 2;
  string action = 3;
}

message AuthorizeResponse {
  bool allowed = 1;
}

message DeleteSpaceRequest {
  int64 space_id = 1;
}

message DeleteSpaceResponse {
  bool success = 1;
}

message CreateUserRequest {
  string user_id = 1;
  int64 space_id = 2;
  bool creator = 3;
}

message CreateUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string user_id = 1;
  int64 space_id = 2;
}

message DeleteUserResponse {
  bool success = 1;
}

