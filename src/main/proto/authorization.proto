syntax = "proto3";

package bazar.authorization.v1;

option java_multiple_files = true;
option java_package = "org.bazar.authorization.grpc";
option java_outer_classname = "AuthorizationProto";

service AuthorizationService {
  rpc Authorize(AuthorizeRequest)
      returns (AuthorizeResponse);
}

message AuthorizeRequest{
  string resource = 1;
  int64 space_id = 2;
  string action = 3;
  optional string resource_id = 4;
  repeated Attribute resource_attributes = 5;
  repeated Attribute principal_attributes = 6;
}

message Attribute {
  string name = 1;
  string value = 2;
}

message AuthorizeResponse{
  bool allowed = 1;
}