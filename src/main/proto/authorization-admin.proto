syntax = "proto3";

package bazar.authorization.v1;

option java_multiple_files = true;
option java_package = "org.bazar.authorization.grpc";
option java_outer_classname = "AuthorizationAdminProto";

service AuthorizationAdminService {

  rpc CreateUser(CreateUserRequest)
      returns (CreateUserResponse);

  rpc DeleteUser(DeleteUserRequest)
      returns (DeleteUserResponse);

  rpc DeleteSpace(DeleteSpaceRequest)
      returns (DeleteSpaceResponse);

}

message DeleteSpaceRequest {
  int64 space_id = 1;
}

message DeleteSpaceResponse {
  bool success = 1;
}

message CreateUserRequest {
  string user_id = 1;
  int64 space_id = 2;
  bool is_creator = 3;
}

message CreateUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string user_id = 1;
  int64 space_id = 2;
  bool is_creator = 3;
}

message DeleteUserResponse {
  bool success = 1;
}
